name: shelfmate
description: ShelfMate - Combined Expiry Tracker + Nutrition Analyzer

publish_to: 'none'

version: 3.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  
  # For Expiry Tracker
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_local_notifications: ^17.2.4
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/indian_foods_nutrition.json
    - assets/rdi_values.json

  

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/app_icon.png"

